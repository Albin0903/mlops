repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.10
  hooks:
    - id: ruff
      files: ^(app|tests)/
    - id: ruff-format
      files: ^(app|tests)/

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml

- repo: https://github.com/yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets
      args: ['--baseline', '.secrets.baseline']
      exclude: .*/tests

- repo: https://github.com/antonbabenko/pre-commit-terraform
  rev: v1.86.0
  hooks:
    - id: terraform_validate

- repo: local
  hooks:
    - id: kubeconform
      name: kubeconform (k8s manifests)
      entry: >-
        bash -c 'docker run --rm -v "$PWD:/work" -w /work ghcr.io/yannh/kubeconform:latest
        -strict -summary -ignore-missing-schemas "$@"' --
      language: system
      pass_filenames: true
      files: ^(k8s|gitops)/.*\.(ya?ml)$
