[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
# regles activees : pyflakes, pycodestyle, isort, bugbear
select = ["E", "F", "I", "B", "W"]
# regles ignorees : lignes trop longues dans les commentaires
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
