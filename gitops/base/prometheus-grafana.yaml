apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/llm-alert-rules.yml

    scrape_configs:
      - job_name: 'mlops-api'
        static_configs:
          - targets: ['mlops-api.mlops.svc.cluster.local:80']
  llm-alert-rules.yml: |
    groups:
      - name: mlops-api-alerts
        rules:
          - alert: HighRequestLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P95 latency is above 5 seconds"
              description: "P95 HTTP latency on mlops-api is above 5s for 5 minutes."

          - alert: HighHTTPErrorRate
            expr: (sum(rate(http_request_duration_seconds_count{status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_request_duration_seconds_count[5m])), 0.000001)) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "HTTP 5xx error rate is above 5%"
              description: "The proportion of 5xx responses is above 5% for 5 minutes."

      - name: llm-quota-alerts
        rules:
          - alert: GroqInstantRPMQuota80
            expr: sum(rate(llm_requests_total{model=\"llama-3.1-8b-instant\"}[1m])) * 60 > 24
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Groq Instant RPM above 80%"
              description: "llama-3.1-8b-instant request rate exceeds 24 RPM (80% of 30 RPM)."

          - alert: Groq70BRPMQuota80
            expr: sum(rate(llm_requests_total{model=\"llama-3.3-70b-versatile\"}[1m])) * 60 > 24
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Groq 70B RPM above 80%"
              description: "llama-3.3-70b-versatile request rate exceeds 24 RPM (80% of 30 RPM)."

          - alert: GroqGptOssRPMQuota80
            expr: sum(rate(llm_requests_total{model=\"openai/gpt-oss-120b\"}[1m])) * 60 > 24
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Groq GPT-OSS RPM above 80%"
              description: "openai/gpt-oss-120b request rate exceeds 24 RPM (80% of 30 RPM)."

          - alert: GeminiFlashRPMQuota80
            expr: sum(rate(llm_requests_total{model=\"gemini-3.1-flash-lite-preview\"}[1m])) * 60 > 12
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Gemini RPM above 80%"
              description: "gemini-3.1-flash-lite-preview request rate exceeds 12 RPM (80% of 15 RPM)."

          - alert: GroqInstantRPDQuota80
            expr: sum(increase(llm_requests_total{model=\"llama-3.1-8b-instant\"}[24h])) > 11520
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq Instant RPD above 80%"
              description: "llama-3.1-8b-instant exceeds 11,520 requests in the last 24h (80% of 14,400 RPD)."

          - alert: Groq70BRPDQuota80
            expr: sum(increase(llm_requests_total{model=\"llama-3.3-70b-versatile\"}[24h])) > 800
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq 70B RPD above 80%"
              description: "llama-3.3-70b-versatile exceeds 800 requests in the last 24h (80% of 1,000 RPD)."

          - alert: GroqGptOssRPDQuota80
            expr: sum(increase(llm_requests_total{model=\"openai/gpt-oss-120b\"}[24h])) > 800
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq GPT-OSS RPD above 80%"
              description: "openai/gpt-oss-120b exceeds 800 requests in the last 24h (80% of 1,000 RPD)."

          - alert: GeminiFlashRPDQuota80
            expr: sum(increase(llm_requests_total{model=\"gemini-3.1-flash-lite-preview\"}[24h])) > 400
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Gemini RPD above 80%"
              description: "gemini-3.1-flash-lite-preview exceeds 400 requests in the last 24h (80% of 500 RPD)."

          - alert: GroqInstantTPDQuota80
            expr: sum(increase(llm_tokens_total{model=\"llama-3.1-8b-instant\"}[24h])) > 400000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq Instant TPD above 80%"
              description: "llama-3.1-8b-instant exceeds 400,000 tokens in the last 24h (80% of 500,000 TPD)."

          - alert: Groq70BTPDQuota80
            expr: sum(increase(llm_tokens_total{model=\"llama-3.3-70b-versatile\"}[24h])) > 80000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq 70B TPD above 80%"
              description: "llama-3.3-70b-versatile exceeds 80,000 tokens in the last 24h (80% of 100,000 TPD)."

          - alert: GroqGptOssTPDQuota80
            expr: sum(increase(llm_tokens_total{model=\"openai/gpt-oss-120b\"}[24h])) > 160000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Groq GPT-OSS TPD above 80%"
              description: "openai/gpt-oss-120b exceeds 160,000 tokens in the last 24h (80% of 200,000 TPD)."

          - alert: GeminiFlashTPMQuota80
            expr: sum(rate(llm_tokens_total{model=\"gemini-3.1-flash-lite-preview\"}[1m])) * 60 > 200000
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Gemini TPM above 80%"
              description: "gemini-3.1-flash-lite-preview exceeds 200,000 tokens/minute (80% of 250,000 TPM)."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: mlops
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: mlops
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-service.mlops:9090
        access: proxy
        isDefault: true
      - name: Loki
        uid: loki
        type: loki
        url: http://loki-service.mlops:3100
        access: proxy
        isDefault: false
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: mlops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472 # ID utilisateur par défaut de Grafana pour les droits sur le volume
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "false"
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: provisioning-volume
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: provider-volume
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yaml
              subPath: dashboard-provider.yaml
            - name: dashboard-data-volume
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: provisioning-volume
          configMap:
            name: grafana-provisioning
        - name: provider-volume
          configMap:
            name: grafana-provisioning
        - name: dashboard-data-volume
          configMap:
            name: grafana-dashboards-default
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: mlops
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: mlops
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    analytics:
      reporting_enabled: false

    limits_config:
      retention_period: 168h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args:
            - "-config.file=/etc/loki/loki.yaml"
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
  namespace: mlops
spec:
  selector:
    app: loki
  ports:
    - protocol: TCP
      port: 3100
      targetPort: 3100
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: mlops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: mlops
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki-service.mlops.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: mlops
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
            - name: run
              mountPath: /run/promtail
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: run
          emptyDir: {}
