apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-default
  namespace: mlops
  labels:
    grafana_dashboard: "1"
data:
  fastapi-monitor.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 15,
            "w": 5,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.1.0",
          "targets": [
            {
              "expr": "sum(http_request_duration_seconds_count)",
              "refId": "A"
            }
          ],
          "title": "Total HTTP Requests",
          "type": "stat"
        },
        {
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                }
              },
              "mappings": []
            },
            "overrides": []
          },
          "gridPos": {
            "h": 15,
            "w": 5,
            "x": 5,
            "y": 0
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "pieType": "pie",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (status) (rate(http_request_duration_seconds_count[5m]))",
              "refId": "A"
            }
          ],
          "title": "HTTP Status Codes (last 5m)",
          "type": "piechart"
        },
        {
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "max": 5,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 14,
            "x": 10,
            "y": 0
          },
          "id": 2,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "sizing": "auto"
          },
          "pluginVersion": "11.1.0",
          "targets": [
            {
              "expr": "rate(http_request_duration_seconds_sum[1m]) / rate(http_request_duration_seconds_count[1m])",
              "refId": "A"
            }
          ],
          "title": "Average Latency (seconds)",
          "type": "gauge"
        },
        {
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 14,
            "x": 10,
            "y": 7
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count[1m]))",
              "refId": "A"
            }
          ],
          "title": "Request Rate (per second)",
          "type": "timeseries"
        }
      ],
      "refresh": "",
      "schemaVersion": 39,
      "tags": [
        "fastapi",
        "mlops"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "MLOps API Monitoring",
      "uid": "mlops-api-main",
      "version": 1,
      "weekStart": ""
    }
  llm-quotas.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (provider, model) (rate(llm_requests_total[1m])) * 60",
              "legendFormat": "{{provider}} / {{model}}",
              "refId": "A"
            }
          ],
          "title": "LLM Requests Per Minute",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * (sum(increase(llm_requests_total{model=\"llama-3.1-8b-instant\"}[24h])) / 14400)",
              "legendFormat": "Groq 8B RPD usage %",
              "refId": "A"
            },
            {
              "expr": "100 * (sum(increase(llm_requests_total{model=\"llama-3.3-70b-versatile\"}[24h])) / 1000)",
              "legendFormat": "Groq 70B RPD usage %",
              "refId": "B"
            },
            {
              "expr": "100 * (sum(increase(llm_requests_total{model=\"openai/gpt-oss-120b\"}[24h])) / 1000)",
              "legendFormat": "Groq GPT-OSS RPD usage %",
              "refId": "C"
            },
            {
              "expr": "100 * (sum(increase(llm_requests_total{model=\"gemini-3.1-flash-lite-preview\"}[24h])) / 500)",
              "legendFormat": "Gemini RPD usage %",
              "refId": "D"
            }
          ],
          "title": "Daily Request Quota Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * (sum(increase(llm_tokens_total{model=\"llama-3.1-8b-instant\"}[24h])) / 500000)",
              "legendFormat": "Groq 8B TPD usage %",
              "refId": "A"
            },
            {
              "expr": "100 * (sum(increase(llm_tokens_total{model=\"llama-3.3-70b-versatile\"}[24h])) / 100000)",
              "legendFormat": "Groq 70B TPD usage %",
              "refId": "B"
            },
            {
              "expr": "100 * (sum(increase(llm_tokens_total{model=\"openai/gpt-oss-120b\"}[24h])) / 200000)",
              "legendFormat": "Groq GPT-OSS TPD usage %",
              "refId": "C"
            }
          ],
          "title": "Daily Token Quota Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * ((sum(rate(llm_tokens_total{model=\"gemini-3.1-flash-lite-preview\"}[1m])) * 60) / 250000)",
              "legendFormat": "Gemini TPM usage %",
              "refId": "A"
            }
          ],
          "title": "Gemini Tokens Per Minute Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 2
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "expr": "100 * (sum(rate(http_request_duration_seconds_count{status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_request_duration_seconds_count[5m])), 0.000001))",
              "refId": "A"
            }
          ],
          "title": "HTTP 5xx Error Rate (5m)",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 3
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 16
          },
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "refId": "A"
            }
          ],
          "title": "HTTP P95 Latency",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 16
          },
          "id": 7,
          "options": {
            "dedupStrategy": "exact",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showLabels": true,
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "expr": "{namespace=\"mlops\"}",
              "refId": "A"
            }
          ],
          "title": "Centralized Logs (Loki)",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 24
          },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (model) (rate(llm_tokens_total{type=\"input\"}[5m]))",
              "legendFormat": "input / {{model}}",
              "refId": "A"
            },
            {
              "expr": "sum by (model) (rate(llm_tokens_total{type=\"output\"}[5m]))",
              "legendFormat": "output / {{model}}",
              "refId": "B"
            }
          ],
          "title": "LLM Tokens In/Out Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 24
          },
          "id": 9,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (model) (rate(llm_latency_seconds_sum[5m])) / clamp_min(sum by (model) (rate(llm_latency_seconds_count[5m])), 0.000001)",
              "legendFormat": "{{model}}",
              "refId": "A"
            }
          ],
          "title": "LLM Average Latency By Model",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 24
          },
          "id": 10,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "expr": "((sum(increase(llm_tokens_total{model=\"llama-3.1-8b-instant\",type=\"input\"}[24h])) * 0.00000005) + (sum(increase(llm_tokens_total{model=\"llama-3.1-8b-instant\",type=\"output\"}[24h])) * 0.00000008) + (sum(increase(llm_tokens_total{model=\"llama-3.3-70b-versatile\",type=\"input\"}[24h])) * 0.00000059) + (sum(increase(llm_tokens_total{model=\"llama-3.3-70b-versatile\",type=\"output\"}[24h])) * 0.00000079) + (sum(increase(llm_tokens_total{model=\"openai/gpt-oss-120b\",type=\"input\"}[24h])) * 0.00000015) + (sum(increase(llm_tokens_total{model=\"openai/gpt-oss-120b\",type=\"output\"}[24h])) * 0.00000045) + (sum(increase(llm_tokens_total{model=\"gemini-3.1-flash-lite-preview\",type=\"input\"}[24h])) * 0.000000075) + (sum(increase(llm_tokens_total{model=\"gemini-3.1-flash-lite-preview\",type=\"output\"}[24h])) * 0.00000030))",
              "refId": "A"
            }
          ],
          "title": "Estimated Cost Last 24h (USD)",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "llm",
        "quotas",
        "mlops"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "LLM Quotas and Logs",
      "uid": "mlops-llm-quotas",
      "version": 1,
      "weekStart": ""
    }
