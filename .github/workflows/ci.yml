name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/*", "fix/*", "bugfix/*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # etape 1a : gates qualite (parite prepush local)
  # ──────────────────────────────────────────────
  lint:
    name: "Quality Gates (Prepush)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install quality tooling
        run: pip install ruff==0.9.10 pre-commit==4.5.1

      - name: Enforce API core boundaries
        run: python scripts/check_api_core_boundaries.py

      - name: Run prepush quality gates
        env:
          TERRAFORM_VALIDATE_SCOPE: all
        run: make prepush

  # ──────────────────────────────────────────────
  # etape 1b : tests unitaires + couverture (parallele)
  # ──────────────────────────────────────────────
  test:
    name: "Tests (Pytest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: make test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # etape 2 : scan de securite docker (apres tests)
  # ──────────────────────────────────────────────
  security:
    name: "Security Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase image name
        id: image
        run: echo "name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ steps.image.outputs.name }}:scan
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ──────────────────────────────────────────────
  # etape 3 : build et push vers ghcr (main only)
  # ──────────────────────────────────────────────
  build-and-push:
    name: "Build & Push (GHCR)"
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
