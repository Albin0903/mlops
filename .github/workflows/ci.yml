name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/*", "fix/*"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # etape 1a : linting avec ruff (parallele)
  # ──────────────────────────────────────────────
  lint:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.9.10

      - name: Ruff check (linting)
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

  # ──────────────────────────────────────────────
  # etape 1b : tests unitaires + couverture (parallele)
  # ──────────────────────────────────────────────
  test:
    name: "Tests (Pytest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.5 pytest-asyncio==0.25.3 pytest-cov==6.1.1 httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # etape 2 : scan de securite docker (apres tests)
  # ──────────────────────────────────────────────
  security:
    name: "Security Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.image.outputs.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ──────────────────────────────────────────────
  # etape 3 : build et push vers ghcr (main only)
  # ──────────────────────────────────────────────
  build-and-push:
    name: "Build & Push (GHCR)"
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
